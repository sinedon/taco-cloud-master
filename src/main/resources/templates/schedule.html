<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Schedule Videos</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <meta charset="UTF-8">
</head>

<body>

<div th:replace="fragments/header :: header"></div>

<h1>Video Scheduler</h1>

<div class="scheduler-layout">
    <div class="schedule-form">

        <h3>Welcome, <span th:text="${username}"></span>!</h3>

        <hr>

        <h2>Schedule a YouTube Video</h2>

        <div th:if="${error}" style="color:red; margin-bottom:10px;">
            <p th:text="${error}"></p>
        </div>

        <form th:action="@{/schedule}" 
              th:object="${schedule}" 
              method="post">

            <div>
                <label>Video Name</label>
                <input type="text" th:field="*{videoName}" required />
            </div>

            <div>
                <label>YouTube URL</label>
                <input type="text" th:field="*{youtubeURL}" required />
            </div>

            <div>
                <label>Schedule Time</label>
                <input type="datetime-local" th:field="*{schedTime}" required />
            </div>

            <div>
                <label>Select Timezone</label>

                <select th:field="*{timeZone}" id="timeZoneSelect" required>
                    <option value="">-- Select Timezone --</option>
                </select>
            </div>

            <button type="submit">Schedule Video</button>
        </form>

        <hr>
    </div>

    <div class="scheduler-list">
        <h2>Your Scheduled Videos</h2>

        <table>
            <thead>
                <tr>
                    <th>Video Name</th>
                    <th>YouTube URL</th>
                    <th>Scheduled Time</th>
                    <th>Delete</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="video : ${schedules}">
                    <td th:text="${video.videoName}"></td>
                    <td>
                        <a th:href="${video.youtubeURL}" 
                           th:text="${video.youtubeURL}" 
                           target="_blank">
                        </a>
                    </td>
                    <td th:text="${video.schedTime}"></td>
                    <td>
                        <form th:action="@{/schedule/delete/{id}(id=${video.videoID})}" method="post">
                            <button type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const select = document.getElementById("timeZoneSelect");

    const timeZones = Intl.supportedValuesOf("timeZone");

    timeZones.sort();

    timeZones.forEach(tz => {
        const option = document.createElement("option");
        option.value = tz;
        option.textContent = tz.replaceAll("_", " ");
        select.appendChild(option);
    });

    const detectedTZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

    if (detectedTZ) {
        select.value = detectedTZ;
    }
});
</script>

</body>
</html>
