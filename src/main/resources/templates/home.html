<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Now Playing</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:if="${video == null}" th:replace="fragments/header :: header"></div>

<h1 th:if="${video == null}">Now Playing</h1>

<div th:if="${video != null}" class="schedule-button" style="position:absolute; top:20px; right:20px; z-index:1000;">
    <a th:href="@{/schedule(override=true)}">
        <button type="button">Back to Schedule</button>
    </a>
</div>

<div th:if="${video != null}" class="video-wrapper">
    <div id="player"
         th:data-video-id="${#strings.substringAfter(video.youtubeURL,'v=')}"
         th:data-start-offset="${startOffset}">
    </div>
</div>

<div class="container">
    <div class="card">

        <div th:if="${video == null}">
            <p>No video scheduled at this time.</p>
        </div>

        <div style="margin-top: 20px;">
            <a th:href="@{/schedule}">
                <button type="button">Back to Schedule</button>
            </a>
        </div>

    </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>

let player;

function onYouTubeIframeAPIReady() {

    const container = document.getElementById("player");

    if (!container) return;

    const videoId = container.dataset.videoId;
    const startOffset = container.dataset.startOffset || 0;

    player = new YT.Player("player", {
        videoId: videoId,
        playerVars: {
            autoplay: 1,
            modestbranding: 1,
            rel: 0,
            start: startOffset
        },
        events: {
            onReady: function(event) {
                event.target.playVideo();
            }
        }
    });
}

</script>

</body>
</html>
